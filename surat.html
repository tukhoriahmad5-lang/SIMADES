<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>SIMADES — Surat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; font-family: system-ui, sans-serif; }
    
    .app { display: flex; min-height: 100vh; }
    
    .sidebar {
      width: 240px;
      background: #1e293b;
      color: #e2e8f0;
      position: fixed;
      left: -240px;
      height: 100vh;
      transition: 0.3s;
      z-index: 1000;
    }
    .sidebar.open { left: 0; }
    .sidebar-header { padding: 20px; border-bottom: 1px solid #334155; }
    .sidebar-header h3 { color: #34d399; }
    .menu-item {
      display: block;
      padding: 12px 20px;
      color: #cbd5e1;
      text-decoration: none;
    }
    .menu-item:hover { background: #334155; color: #34d399; }
    .sidebar-footer { padding: 20px; font-size: 12px; margin-top: auto; }
    
    .main { flex: 1; width: 100%; }
    .navbar {
      background: #1e293b;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .menu-toggle { background: none; border: none; color: #34d399; font-size: 24px; cursor: pointer; }
    .brand { color: #34d399; font-weight: bold; }
    .btn-logout { background: transparent; border: 1px solid #475569; color: #cbd5e1; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    .btn-logout:hover { background: #ef4444; border-color: #ef4444; color: white; }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .user-detail {
      text-align: right;
    }
    .user-name {
      color: #e2e8f0;
      font-size: 14px;
      font-weight: 600;
    }
    .user-jabatan {
      color: #94a3b8;
      font-size: 11px;
    }
    
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .card h3 { font-size: 16px; margin-bottom: 12px; }
    
    select, input {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    
    .search-box {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    
    .preview {
      background: white;
      padding: 30px;
      font-family: 'Times New Roman', serif;
      font-size: 12px;
      line-height: 1.8;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      min-height: 500px;
    }
    
    .btn-primary {
      background: #059669;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-secondary {
      background: #f1f5f9;
      border: 1px solid #cbd5e1;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-warning {
      background: #f59e0b;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
    }
    
    .table-responsive {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .surat-table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
    }
    .surat-table th, .surat-table td {
      padding: 10px 8px;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
    }
    .surat-table th:first-child, .surat-table td:first-child {
      word-break: break-word;
      white-space: normal;
      min-width: 200px;
    }
    .surat-table th:last-child, .surat-table td:last-child {
      white-space: nowrap;
      min-width: 120px;
    }
    
    /* Tabel data warga dengan lebar tetap agar titik dua rata */
    .data-table {
      width: 100%;
      margin: 16px 0;
      border-collapse: collapse;
    }
    .data-table td {
      padding: 6px 0;
      text-align: left;
      vertical-align: top;
    }
    .data-table td:first-child {
      width: 170px;
    }
    
    [contenteditable="true"] {
      background: #fef9c3;
      padding: 2px 6px;
      border-radius: 4px;
      display: inline-block;
      min-width: 150px;
      outline: none;
    }
    [contenteditable="true"]:hover {
      background: #fde047;
    }
    [contenteditable="true"]:focus {
      background: #fef08a;
      outline: 1px solid #eab308;
    }
    
    .footer { text-align: center; padding: 16px; color: #64748b; font-size: 11px; }
    .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
    .overlay.show { display: block; }
    
    /* Tombol aksi */
    .action-buttons {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .action-buttons button {
      padding: 4px 10px;
      font-size: 12px;
    }
    
    @media print {
      .sidebar, .navbar, .card-header, .btn-primary, .btn-secondary, .btn-warning, .search-box, .overlay, .menu-toggle, .btn-logout, .card:first-child, .card:last-child {
        display: none !important;
      }
      body { background: white; margin: 0; padding: 0; }
      .container { padding: 0; margin: 0; }
      .preview {
        padding: 2cm;
        margin: 0;
        border: none;
        box-shadow: none;
      }
      [contenteditable="true"] {
        background: transparent;
        padding: 0;
        border: none;
      }
    }
    
    @media (min-width: 768px) {
      .sidebar { position: relative; left: 0; width: 240px; }
      .menu-toggle { display: none; }
    }
    
    @media (max-width: 640px) {
      .surat-table th:first-child, .surat-table td:first-child {
        min-width: 180px;
      }
      .data-table td:first-child {
        width: 130px;
      }
      .action-buttons {
        flex-direction: column;
        gap: 4px;
      }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header"><h3>SIMADES</h3><p>Desa Sidomulyo</p></div>
    <div id="sidebarMenu"></div>
    <div class="sidebar-footer"><span id="sidebarJabatan">Loading...</span></div>
  </div>

  <div class="main">
    <nav class="navbar">
      <div style="display: flex; align-items: center; gap: 16px;">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <a href="dashboard.html" class="brand" style="text-decoration: none; color: #34d399;">SIMADES</a>
      </div>
      <div class="user-info">
        <div class="user-detail">
          <div id="userNameDisplay" class="user-name">Loading...</div>
          <div id="userJabatanDisplay" class="user-jabatan">-</div>
        </div>
        <button class="btn-logout" onclick="logout()">Keluar</button>
      </div>
    </nav>

    <div class="container" id="mainContainer"></div>
    <div class="footer">&copy; 2026 Pemerintah Desa Sidomulyo</div>
  </div>
</div>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>

<script>
  const SUPA_URL = 'https://orqllypofnpsfxmavtgr.supabase.co';
  const SUPA_KEY = 'sb_publishable_1olKTJsNxGp0LBBbBb8CMQ_fpTt2mgZ';
  const supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);

  let currentUser = { nama: '', role: '', id: '' };
  let desaData = {};
  let selectedWarga = null;
  let currentJenis = '';
  let currentNoSurat = '';

  const JENIS_SURAT = [
    'Surat Keterangan Domisili',
    'Surat Keterangan Usaha',
    'Surat Keterangan Tidak Mampu',
    'Surat Keterangan Kelahiran',
    'Surat Keterangan Kematian',
    'Surat Keterangan Pindah',
    'Pengantar SKCK',
    'Pengantar Nikah',
    'Pengantar Izin'
  ];

  async function cekSesi() {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) { window.location.href = 'index.html'; return; }
    const { data: profil } = await supabase.from('data_pengguna').select('nama_pejabat, role, id').eq('auth_id', user.id).single();
    if (profil) {
      currentUser = { nama: profil.nama_pejabat, role: profil.role, id: profil.id };
      document.getElementById('userNameDisplay').textContent = profil.nama_pejabat;
      let jabatanTeks = '';
      if (profil.role === 'admin') jabatanTeks = 'Administrator';
      else if (profil.role === 'pemdes') jabatanTeks = 'Perangkat Desa';
      else if (profil.role === 'rt') jabatanTeks = 'Ketua RT';
      document.getElementById('userJabatanDisplay').textContent = jabatanTeks;
      document.getElementById('sidebarJabatan').textContent = jabatanTeks;
    }
    const { data: desa } = await supabase.from('data_desa').select('*').single();
    if (desa) desaData = desa;
    renderSidebar();
    renderListSurat();
  }

  function renderSidebar() {
    const menu = document.getElementById('sidebarMenu');
    let html = '';
    if (currentUser.role === 'admin') {
      html = `<a href="kelola-user.html" class="menu-item">👑 Kelola User</a>
              <a href="ganti-password.html" class="menu-item">🔑 Ganti Password</a>`;
    } else if (currentUser.role === 'pemdes') {
      html = `<a href="kartu-keluarga.html" class="menu-item">📋 Kartu Keluarga</a>
              <a href="daftar-penduduk.html" class="menu-item">👥 Daftar Penduduk</a>
              <a href="surat.html" class="menu-item">📝 Surat</a>
              <a href="pengaturan-desa.html" class="menu-item">🏠 Pengaturan</a>
              <a href="ganti-password.html" class="menu-item">🔑 Ganti Password</a>`;
    } else if (currentUser.role === 'rt') {
      html = `<a href="kartu-keluarga.html" class="menu-item">📋 Kartu Keluarga</a>
              <a href="daftar-penduduk.html" class="menu-item">👥 Daftar Penduduk</a>
              <a href="ganti-password.html" class="menu-item">🔑 Ganti Password</a>`;
    }
    menu.innerHTML = html;
  }

  function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
  function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

  // ========== DAFTAR SURAT ==========
  async function renderListSurat() {
    const { data } = await supabase.from('data_surat').select('id, no_surat, created_at').order('created_at', { ascending: false });
    const container = document.getElementById('mainContainer');
    container.innerHTML = `
      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 16px;">
          <h3>📝 Daftar Surat</h3>
          <button class="btn-primary" onclick="renderFormSurat()">+ Baru</button>
        </div>
        <input type="text" id="searchSurat" class="search-box" placeholder="🔍 Cari No. Surat..." oninput="filterSurat()">
        <div class="table-responsive">
          <table class="surat-table">
            <thead><tr><th>No. Surat</th><th>Aksi</th></tr></thead>
            <tbody id="suratList"></tbody>
          
        </div>
      </div>
    `;
    const tbody = document.getElementById('suratList');
    if (!data || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="2" style="text-align:center">Belum ada surat</td></tr>';
      return;
    }
    let html = '';
    data.forEach(s => {
      html += `<tr>
        <td>${s.no_surat}</td>
        <td class="action-buttons">
          <button class="btn-secondary" onclick="cetakSurat('${s.id}')">🖨️ Cetak</button>
          <button class="btn-warning" onclick="editSurat('${s.id}')">✏️ Edit</button>
          <button class="btn-secondary" onclick="hapusSurat('${s.id}')">🗑️ Hapus</button>
        </td>
      </tr>`;
    });
    tbody.innerHTML = html;
  }

  async function filterSurat() {
    const search = document.getElementById('searchSurat')?.value.toLowerCase() || '';
    const { data } = await supabase.from('data_surat').select('id, no_surat, created_at').order('created_at', { ascending: false });
    const tbody = document.getElementById('suratList');
    if (!data || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="2" style="text-align:center">Belum ada surat</td></tr>';
      return;
    }
    let filtered = data;
    if (search) {
      filtered = data.filter(s => s.no_surat.toLowerCase().includes(search));
    }
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="2" style="text-align:center">Tidak ditemukan</td></tr>';
      return;
    }
    let html = '';
    filtered.forEach(s => {
      html += `<tr>
        <td>${s.no_surat}</td>
        <td class="action-buttons">
          <button class="btn-secondary" onclick="cetakSurat('${s.id}')">🖨️ Cetak</button>
          <button class="btn-warning" onclick="editSurat('${s.id}')">✏️ Edit</button>
          <button class="btn-secondary" onclick="hapusSurat('${s.id}')">🗑️ Hapus</button>
        </td>
      </tr>`;
    });
    tbody.innerHTML = html;
  }

  async function hapusSurat(id) { 
    if (confirm('Yakin hapus surat ini?')) { 
      await supabase.from('data_surat').delete().eq('id', id); 
      renderListSurat(); 
    } 
  }

  async function cetakSurat(id) {
    const { data: s } = await supabase.from('data_surat').select('*').eq('id', id).single();
    if (!s) { alert('Surat tidak ditemukan'); return; }
    if (!s.isi_surat || s.isi_surat === '') { alert('Isi surat kosong'); return; }
    
    const win = window.open('', '_blank');
    win.document.write(`
      <!DOCTYPE html>
      <html>
      <head>
        <title>Cetak Surat - ${s.no_surat}</title>
        <style>
          body { font-family: 'Times New Roman', serif; margin: 0; padding: 2cm; background: white; }
          .surat { max-width: 800px; margin: 0 auto; line-height: 1.8; font-size: 12pt; }
          .data-table { width: 100%; margin: 16px 0; border-collapse: collapse; }
          .data-table td { padding: 6px 0; vertical-align: top; }
          .data-table td:first-child { width: 170px; }
          hr { margin: 12px 0; }
          .header-logo {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
          }
          .header-logo img { height: 70px; width: auto; }
          .header-text { flex: 1; text-align: left; }
          [contenteditable="true"] {
            background: transparent;
            padding: 0;
          }
          @media print {
            body { padding: 0; margin: 0; }
          }
        </style>
      </head>
      <body>
        <div class="surat">
          ${s.isi_surat}
        </div>
        <script>
          window.onload = function() { window.print(); };
        <\/script>
      </body>
      </html>
    `);
    win.document.close();
  }

  // ========== EDIT SURAT ==========
  async function editSurat(id) {
    // Ambil data surat dari database
    const { data: surat, error } = await supabase
      .from('data_surat')
      .select('*')
      .eq('id', id)
      .single();
    
    if (error || !surat) {
      alert('Data surat tidak ditemukan!');
      return;
    }
    
    // Parsing data warga dari isi surat (ambil NIK dan Nama)
    const nikMatch = surat.isi_surat.match(/NIK<\/td><td[^>]*>:?\s*(\d+)/i);
    const namaMatch = surat.isi_surat.match(/Nama<\/td><td[^>]*>:?\s*([^<]+)/i);
    
    const nik = nikMatch ? nikMatch[1] : '';
    const nama = namaMatch ? namaMatch[1].trim() : surat.nama || '';
    
    // Cari data warga lengkap berdasarkan NIK
    if (nik) {
      const { data: warga } = await supabase
        .from('anggota_keluarga')
        .select('*')
        .eq('nik', nik)
        .single();
      
      if (warga) {
        let alamat = '-';
        const { data: kkData } = await supabase
          .from('anggota_keluarga')
          .select('kk_id')
          .eq('nik', nik)
          .single();
        
        if (kkData && kkData.kk_id) {
          const { data: kk } = await supabase
            .from('kartu_keluarga')
            .select('dusun_id, rt_id')
            .eq('id', kkData.kk_id)
            .single();
          
          if (kk) {
            const { data: dusun } = await supabase
              .from('data_dusun')
              .select('nama_dusun, nomor_dusun')
              .eq('id', kk.dusun_id)
              .single();
            
            const { data: rt } = await supabase
              .from('data_rt')
              .select('nomor_rt')
              .eq('id', kk.rt_id)
              .single();
            
            if (dusun && rt) {
              alamat = `DUSUN ${dusun.nama_dusun} RT ${rt.nomor_rt}/${dusun.nomor_dusun} DESA ${desaData.nama_desa || 'SIDOMULYO'}`;
            }
          }
        }
        
        selectedWarga = {
          nik: warga.nik,
          nama: warga.nama_lengkap,
          tempatLahir: warga.tempat_lahir || '',
          tglLahir: warga.tanggal_lahir || '',
          jk: warga.jenis_kelamin || '',
          pekerjaan: warga.pekerjaan || '',
          alamat: alamat
        };
      }
    } else {
      selectedWarga = { nik: '', nama: nama, tempatLahir: '', tglLahir: '', jk: '', pekerjaan: '', alamat: '-' };
    }
    
    currentJenis = surat.jenis_surat;
    currentNoSurat = surat.no_surat;
    
    // Render form edit
    const container = document.getElementById('mainContainer');
    container.innerHTML = `
      <div class="card">
        <h3>✏️ Edit Surat</h3>
        <div style="padding:12px; background:#f8fafc; border-radius:8px; margin-bottom:16px;">
          <strong>No. Surat:</strong> ${currentNoSurat}<br>
          <strong>Jenis:</strong> ${currentJenis}<br>
          <strong>Warga:</strong> ${selectedWarga.nama} (${selectedWarga.nik || '-'})
        </div>
      </div>
      <div class="card">
        <h3>📄 Isi Surat (klik area KUNING untuk edit)</h3>
        <div id="preview" class="preview"></div>
      </div>
      <div class="card" style="display: flex; gap: 12px; justify-content: flex-end;">
        <button class="btn-secondary" onclick="renderListSurat()">Batal</button>
        <button class="btn-primary" onclick="updateSurat('${surat.id}')">💾 Update Surat</button>
      </div>
    `;
    
    // Tampilkan isi surat di preview
    const previewDiv = document.getElementById('preview');
    if (previewDiv) {
      previewDiv.innerHTML = surat.isi_surat;
    }
  }

  async function updateSurat(id) {
    const previewDiv = document.getElementById('preview');
    const isiSuratBaru = previewDiv ? previewDiv.innerHTML : '';
    
    if (!isiSuratBaru || isiSuratBaru === '') {
      alert('Isi surat kosong!');
      return;
    }
    
    const { error } = await supabase
      .from('data_surat')
      .update({
        isi_surat: isiSuratBaru,
        updated_at: new Date().toISOString()
      })
      .eq('id', id);
    
    if (error) {
      alert('Gagal update: ' + error.message);
    } else {
      alert('✅ Surat berhasil diupdate!');
      renderListSurat();
    }
  }

  // ========== FORM SURAT BARU ==========
  async function renderFormSurat() {
    selectedWarga = null;
    currentJenis = '';
    currentNoSurat = '';
    
    const container = document.getElementById('mainContainer');
    container.innerHTML = `
      <div class="card">
        <h3>👤 Pilih Warga</h3>
        <input type="text" id="cariWarga" placeholder="Cari NIK / Nama..." oninput="cariWarga()">
        <div id="hasilCari" style="max-height:200px; overflow-y:auto;"></div>
        <div id="wargaInfo" style="display:none; margin-top:12px; padding:12px; background:#f8fafc; border-radius:8px;"></div>
      </div>
      <div class="card">
        <h3>📝 Jenis Surat</h3>
        <select id="jenisSurat" onchange="buatPreview()">
          <option value="">-- Pilih --</option>
          ${JENIS_SURAT.map(j => `<option value="${j}">${j}</option>`).join('')}
        </select>
      </div>
      <div class="card">
        <h3>📄 Isi Surat (klik area KUNING untuk edit)</h3>
        <div id="preview" class="preview"></div>
      </div>
      <div class="card" style="display: flex; gap: 12px; justify-content: flex-end;">
        <button class="btn-secondary" onclick="renderListSurat()">Batal</button>
        <button class="btn-primary" onclick="simpanSurat()">💾 Simpan Surat</button>
      </div>
    `;
  }

  async function cariWarga() {
    const search = document.getElementById('cariWarga')?.value.toLowerCase();
    if (!search || search.length < 3) { document.getElementById('hasilCari').innerHTML = ''; return; }
    const { data } = await supabase.from('anggota_keluarga').select('nik, nama_lengkap, tempat_lahir, tanggal_lahir, jenis_kelamin, pekerjaan').limit(20);
    const filtered = data.filter(w => w.nik.includes(search) || (w.nama_lengkap && w.nama_lengkap.toLowerCase().includes(search)));
    const hasilDiv = document.getElementById('hasilCari');
    if (filtered.length === 0) { hasilDiv.innerHTML = '<div>Tidak ditemukan</div>'; return; }
    let html = '';
    filtered.forEach(w => {
      html += `<div style="padding:8px; border-bottom:1px solid #ccc; cursor:pointer;" onclick="pilihWarga('${w.nik}', '${w.nama_lengkap}', '${w.tempat_lahir || ''}', '${w.tanggal_lahir || ''}', '${w.jenis_kelamin || ''}', '${w.pekerjaan || ''}')">
        <strong>${w.nama_lengkap}</strong><br><small>NIK: ${w.nik}</small>
      </div>`;
    });
    hasilDiv.innerHTML = html;
  }

  async function pilihWarga(nik, nama, tempatLahir, tglLahir, jk, pekerjaan) {
    let alamat = '-';
    const { data: warga } = await supabase.from('anggota_keluarga').select('kk_id').eq('nik', nik).single();
    if (warga && warga.kk_id) {
      const { data: kk } = await supabase.from('kartu_keluarga').select('dusun_id, rt_id').eq('id', warga.kk_id).single();
      if (kk) {
        const { data: dusun } = await supabase.from('data_dusun').select('nama_dusun, nomor_dusun').eq('id', kk.dusun_id).single();
        const { data: rt } = await supabase.from('data_rt').select('nomor_rt').eq('id', kk.rt_id).single();
        if (dusun && rt) {
          alamat = `DUSUN ${dusun.nama_dusun} RT ${rt.nomor_rt}/${dusun.nomor_dusun} DESA ${desaData.nama_desa || 'SIDOMULYO'}`;
        }
      }
    }
    selectedWarga = { nik, nama, tempatLahir, tglLahir, jk, pekerjaan, alamat };
    document.getElementById('wargaInfo').style.display = 'block';
    document.getElementById('wargaInfo').innerHTML = `<strong>✓ Warga:</strong> ${nama} (${nik})<br><small>${alamat}</small>`;
    document.getElementById('hasilCari').innerHTML = '';
    document.getElementById('cariWarga').value = nama;
    if (document.getElementById('jenisSurat').value) buatPreview();
  }

  async function getNomorUrut(jenis) {
    const bulanRomawi = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII'][new Date().getMonth()];
    const tahun = new Date().getFullYear();
    const inisial = jenis === 'Surat Keterangan Domisili' ? 'DS' :
                    jenis === 'Surat Keterangan Usaha' ? 'SKU' :
                    jenis === 'Surat Keterangan Tidak Mampu' ? 'SKTM' :
                    jenis === 'Surat Keterangan Kelahiran' ? 'SKL' :
                    jenis === 'Surat Keterangan Kematian' ? 'SKM' :
                    jenis === 'Surat Keterangan Pindah' ? 'SKP' : 'SK';
    
    const { data } = await supabase.from('data_surat').select('no_surat').ilike('no_surat', `${inisial}/%/${bulanRomawi}/SIDOMULYO-KESESI/${tahun}%`);
    let maxUrut = 0;
    if (data && data.length > 0) {
      data.forEach(s => {
        const parts = s.no_surat.split('/');
        if (parts[0]) {
          const urut = parseInt(parts[0]);
          if (urut > maxUrut) maxUrut = urut;
        }
      });
    }
    const nomorUrut = String(maxUrut + 1).padStart(3, '0');
    currentNoSurat = `${inisial}/${nomorUrut}/${bulanRomawi}/SIDOMULYO-KESESI/${tahun}`;
    return currentNoSurat;
  }

  async function buatPreview() {
    const jenis = document.getElementById('jenisSurat').value;
    if (!jenis || !selectedWarga) return;
    currentJenis = jenis;
    const noSurat = await getNomorUrut(jenis);
    
    const tglLahir = selectedWarga.tglLahir ? new Date(selectedWarga.tglLahir).toLocaleDateString('id') : '-';
    const jkText = selectedWarga.jk === 'LAKI-LAKI' ? 'LAKI-LAKI' : 'PEREMPUAN';
    
    const defaultTtd = `KEPALA DESA ${(desaData.nama_desa || 'SIDOMULYO').toUpperCase()}<br><br>${desaData.kepala_desa || 'KEPALA DESA'}`;
    
    const editableKeperluan = `<span contenteditable="true" id="keperluanEdit">(klik untuk edit keperluan)</span>`;
    const editableTtd = `<span contenteditable="true" id="ttdEdit" style="white-space: pre-line;">${defaultTtd}</span>`;

    const html = `
      <div class="header-logo" style="display: flex; align-items: center; gap: 20px; margin-bottom: 20px;">
        ${desaData.logo_url ? `<img src="${desaData.logo_url}" style="height: 70px; width: auto;">` : '<div style="width:70px"></div>'}
        <div class="header-text" style="flex:1; text-align: left;">
          <div><strong>PEMERINTAH DESA ${(desaData.nama_desa || 'SIDOMULYO').toUpperCase()}</strong></div>
          <div>KECAMATAN ${(desaData.nama_kecamatan || 'KESESI').toUpperCase()}</div>
          <div>KABUPATEN ${(desaData.nama_kabupaten || 'PEKALONGAN').toUpperCase()}</div>
          <div>${desaData.alamat_kantor || 'Jl. Raya Kesesi - Sidomulyo'}</div>
        </div>
      </div>
      <hr style="margin: 8px 0;"><hr style="margin: 2px 0;">
      <div style="text-align:center; margin:24px 0;">
        <strong style="text-decoration:underline;">${currentJenis}</strong><br>
        Nomor: ${currentNoSurat}
      </div>
      <div>Yang bertanda tangan di bawah ini, Kepala Desa ${desaData.nama_desa || 'SIDOMULYO'} menerangkan bahwa:</div>
      
      <table class="data-table">
        <tr><td style="width: 170px; padding: 6px 0;">Nama</td><td style="padding: 6px 0;">: ${selectedWarga.nama}</td></tr>
        <tr><td style="width: 170px; padding: 6px 0;">NIK</td><td style="padding: 6px 0;">: ${selectedWarga.nik}</td></tr>
        <tr><td style="width: 170px; padding: 6px 0;">Tempat / Tgl Lahir</td><td style="padding: 6px 0;">: ${selectedWarga.tempatLahir || '-'}, ${tglLahir}</td></tr>
        <tr><td style="width: 170px; padding: 6px 0;">Jenis Kelamin</td><td style="padding: 6px 0;">: ${jkText}</td></tr>
        <tr><td style="width: 170px; padding: 6px 0;">Pekerjaan</td><td style="padding: 6px 0;">: ${selectedWarga.pekerjaan || '-'}</td></tr>
        <tr><td style="width: 170px; padding: 6px 0;">Alamat</td><td style="padding: 6px 0;">: ${selectedWarga.alamat}</td></tr>
      </table>
      
      <div> ${editableKeperluan}</div>
      <div style="margin-top: 16px;">Demikian surat keterangan ini dibuat dengan sebenarnya, untuk dapat dipergunakan sebagaimana mestinya.</div>
      <div style="margin-top: 48px; text-align: right;">
        ${desaData.nama_desa || 'SIDOMULYO'}, ${new Date().toLocaleDateString('id')}<br>
        ${editableTtd}
      </div>
    `;
    
    const previewDiv = document.getElementById('preview');
    if (previewDiv) previewDiv.innerHTML = html;
  }

  async function simpanSurat() {
    if (!selectedWarga) { alert('Pilih warga!'); return; }
    if (!currentJenis) { alert('Pilih jenis surat!'); return; }
    
    const previewDiv = document.getElementById('preview');
    const isiSurat = previewDiv ? previewDiv.innerHTML : '';
    
    if (!isiSurat || isiSurat === '') {
      alert('Isi surat kosong!');
      return;
    }
    
    const { error } = await supabase.from('data_surat').insert({
      no_surat: currentNoSurat,
      jenis_surat: currentJenis,
      nik: selectedWarga.nik,
      nama: selectedWarga.nama,
      isi_surat: isiSurat,
      created_by: currentUser.id
    });
    
    if (error) alert('Gagal: ' + error.message);
    else { alert('✅ Tersimpan!'); renderListSurat(); }
  }

  async function logout() { await supabase.auth.signOut(); window.location.href = 'index.html'; }
  
  document.addEventListener('DOMContentLoaded', cekSesi);
</script>
</body>
</html>
