<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>SIMADES SIDOMULYO — Masuk</title>
  
  <style>
  .datetime-wrapper {
  text-align: center;
  margin-top: 16px;
  padding: 8px 16px;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(10px);
  border-radius: 9999px;
  display: inline-block;
  width: auto;
}

.date {
  font-size: 13px;
  color: #065f46;
  font-weight: 500;
  letter-spacing: 0.5px;
}

.time {
  font-size: 20px;
  font-weight: 700;
  color: #059669;
  font-family: 'Monaco', 'Courier New', monospace;
}
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg-gradient-start: #e0f2fe;
      --bg-gradient-end: #f0fdf4;
      --card-bg: rgba(255, 255, 255, 0.95);
      --text-main: #0f172a;
      --text-muted: #475569;
      --primary: #059669;
      --primary-hover: #047857;
      --primary-light: #d1fae5;
      --border: #e2e8f0;
      --input-bg: #ffffff;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }
    
    body { 
      background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }
    
    /* Decorative background elements */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(5, 150, 105, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    
    .header { 
      text-align: center; 
      margin-bottom: 32px; 
      width: 100%; 
      max-width: 440px;
      animation: fadeInDown 0.6s ease-out;
    }
    
    .title { 
      font-size: 48px; 
      font-weight: 800; 
      background: linear-gradient(135deg, #059669, #10b981);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    
    .subtitle-desa { 
      font-size: 18px; 
      font-weight: 600; 
      color: #065f46;
      background: rgba(5, 150, 105, 0.1);
      display: inline-block;
      padding: 4px 16px;
      border-radius: 9999px;
      backdrop-filter: blur(10px);
    }
    
    .card { 
      width: 100%; 
      max-width: 440px; 
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border-radius: 24px; 
      padding: 32px; 
      box-shadow: var(--shadow-lg);
      border: 1px solid rgba(255, 255, 255, 0.5);
      animation: fadeInUp 0.6s ease-out;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    
    .form-group { 
      margin-bottom: 20px; 
    }
    
    .form-group label { 
      display: block; 
      font-size: 13px; 
      font-weight: 600; 
      color: var(--text-muted); 
      margin-bottom: 8px; 
      letter-spacing: 0.025em;
    }
    
    .form-group input { 
      width: 100%; 
      background: var(--input-bg); 
      border: 2px solid var(--border); 
      border-radius: 12px; 
      padding: 12px 16px; 
      font-size: 15px; 
      outline: none; 
      transition: all 0.2s ease;
      font-weight: 500;
    }
    
    .form-group input:focus { 
      border-color: var(--primary); 
      box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1);
      background: #ffffff; 
    }
    
    .input-readonly { 
      background: #f1f5f9 !important; 
      color: var(--text-main) !important; 
      cursor: default;
      border-color: #e2e8f0 !important;
      font-weight: 500;
    }
    
    .pass-wrap { 
      position: relative; 
    }
    
    .pass-wrap input { 
      padding-right: 48px; 
    }
    
    .btn-toggle-pass { 
      position: absolute; 
      right: 12px; 
      top: 50%;
      transform: translateY(-50%);
      background: none; 
      border: none; 
      cursor: pointer; 
      font-size: 20px;
      padding: 8px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    
    .btn-toggle-pass:hover {
      background: #f1f5f9;
    }
    
    .btn-submit { 
      width: 100%; 
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      color: #ffffff; 
      border: none; 
      border-radius: 12px; 
      padding: 14px; 
      font-weight: 700; 
      font-size: 16px;
      cursor: pointer; 
      margin-top: 8px;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-sm);
    }
    
    .btn-submit:hover:not(:disabled) { 
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    
    .btn-submit:active:not(:disabled) {
      transform: translateY(0);
    }
    
    .btn-submit:disabled { 
      background: #cbd5e1; 
      cursor: not-allowed; 
      opacity: 0.7;
    }
    
    .alert-error { 
      display: none; 
      background: #fef2f2; 
      color: #dc2626; 
      border: 1px solid #fecaca; 
      border-radius: 12px; 
      padding: 12px 16px; 
      font-size: 13px; 
      margin-top: 16px; 
      text-align: center; 
      font-weight: 500;
    }
    
    .alert-error.show { 
      display: block; 
      animation: shake 0.3s ease-out;
    }
    
    .search-container { 
      position: relative; 
      width: 100%; 
    }
    
    .search-input {
      width: 100%;
      background: var(--input-bg);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      outline: none;
      transition: all 0.2s ease;
    }
    
    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1);
    }
    
    .dropdown-list { 
      position: absolute; 
      top: calc(100% + 8px);
      left: 0; 
      right: 0; 
      background: white; 
      border: 1px solid var(--border); 
      border-radius: 12px; 
      max-height: 280px; 
      overflow-y: auto; 
      z-index: 100; 
      display: none; 
      box-shadow: var(--shadow-lg);
      animation: fadeIn 0.2s ease-out;
    }
    
    .dropdown-list.show { 
      display: block; 
    }
    
    .dropdown-item { 
      padding: 14px 16px; 
      cursor: pointer; 
      border-bottom: 1px solid #f1f5f9;
      transition: all 0.15s ease;
    }
    
    .dropdown-item:hover { 
      background: linear-gradient(135deg, #f0fdf4, #ecfdf5);
      padding-left: 20px;
    }
    
    .dropdown-item strong {
      color: var(--text-main);
      font-size: 14px;
    }
    
    .dropdown-item small {
      font-size: 12px;
      color: var(--text-muted);
    }
    
    .no-results { 
      padding: 14px 16px; 
      color: var(--text-muted); 
      font-style: italic;
      text-align: center;
    }
    
    /* Animations */
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
    
    /* Scrollbar styling */
    .dropdown-list::-webkit-scrollbar {
      width: 6px;
    }
    
    .dropdown-list::-webkit-scrollbar-track {
      background: #f1f5f9;
      border-radius: 10px;
    }
    
    .dropdown-list::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    
    .dropdown-list::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    
    /* Responsive */
    @media (max-width: 640px) {
      .card {
        padding: 24px;
        max-width: 100%;
      }
      
      .title {
        font-size: 36px;
      }
      
      .subtitle-desa {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

<div class="header">
  <h1 class="title">SIMADES</h1>
  <p class="subtitle-desa">SISTEM INFORMASI DAN MANAJEMEN DESA</p>
  <p class="subtitle-desa">SIDOMULYO</p>
  <p>
  <div class="datetime-wrapper" id="datetimeDisplay">
  <div class="date" id="dateDisplay"></div>
  <div class="time" id="timeDisplay"></div></p>
</div>
</div>

<form class="card" id="formLogin" onsubmit="prosesMasukForm(event)">
  <div class="form-group">
    <label>🔍 Cari Jabatan / Nama</label>
    <div class="search-container">
      <input type="text" id="searchJabatan" class="search-input" placeholder="Ketik nama jabatan atau pejabat..." autocomplete="off" oninput="filterJabatan()" onfocus="showDropdown()">
      <div id="dropdownList" class="dropdown-list"></div>
    </div>
  </div>

  <div class="form-group">
    <label>📌 Jabatan Terpilih</label>
    <input type="text" id="inputJabatan" class="input-readonly" readonly placeholder="Akan terisi otomatis..." />
  </div>

  <div class="form-group">
    <label>👤 Nama Pejabat Terkait</label>
    <input id="inputNama" type="text" class="input-readonly" readonly placeholder="Akan terisi otomatis..." />
  </div>

  <div class="form-group">
    <label>🔐 Kata Sandi</label>
    <div class="pass-wrap">
      <input id="inputPassword" type="password" placeholder="Masukkan kata sandi" autocomplete="off" />
      <button class="btn-toggle-pass" onclick="togglePassword()" type="button" id="btnEye">👁️</button>
    </div>
  </div>

  <button class="btn-submit" id="btnMasuk" type="submit">Masuk ke Sistem</button>
  <div class="alert-error" id="alertError"></div>
</form>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>

<script>
  const SUPA_URL = 'https://orqllypofnpsfxmavtgr.supabase.co';
  const SUPA_KEY = 'sb_publishable_1olKTJsNxGp0LBBbBb8CMQ_fpTt2mgZ';
  const supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);
  
  
  let dataPenggunaList = [];
  let selectedJabatan = null;

  (async function loadDataPengguna() {
    try {
      const { data, error } = await supabase.from('data_pengguna').select('jabatan, nama_pejabat, email, role');
      if (error) throw error;
      dataPenggunaList = data || [];
      renderDropdown(dataPenggunaList);
    } catch (e) { console.error(e); }
  })();

  function renderDropdown(items) {
    const dropdown = document.getElementById('dropdownList');
    if (!items || items.length === 0) { 
      dropdown.innerHTML = '<div class="no-results">✨ Tidak ditemukan</div>'; 
      return; 
    }
    dropdown.innerHTML = '';
    items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'dropdown-item';
      div.innerHTML = `<strong>${escapeHtml(item.jabatan)}</strong><br><small>${escapeHtml(item.nama_pejabat)}</small>`;
      div.onclick = () => selectJabatan(item);
      dropdown.appendChild(div);
    });
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function filterJabatan() {
    const searchTerm = document.getElementById('searchJabatan').value.toLowerCase().trim();
    if (searchTerm === '') { renderDropdown(dataPenggunaList); showDropdown(); return; }
    const filtered = dataPenggunaList.filter(item => 
      item.jabatan.toLowerCase().includes(searchTerm) || 
      item.nama_pejabat.toLowerCase().includes(searchTerm)
    );
    renderDropdown(filtered);
    showDropdown();
  }

  function selectJabatan(item) {
    selectedJabatan = item;
    document.getElementById('searchJabatan').value = `${item.jabatan} - ${item.nama_pejabat}`;
    document.getElementById('inputJabatan').value = item.jabatan;
    document.getElementById('inputNama').value = item.nama_pejabat;
    hideDropdown();
    hideError();
  }

  function showDropdown() { 
    document.getElementById('dropdownList').classList.add('show'); 
  }
  
  function hideDropdown() { 
    document.getElementById('dropdownList').classList.remove('show'); 
  }
  
  document.addEventListener('click', function(e) { 
    if (!e.target.closest('.search-container')) hideDropdown(); 
  });

  function prosesMasukForm(event) { 
    event.preventDefault(); 
    masuk(); 
  }
  
  async function masuk() {
    if (!selectedJabatan) { 
      showError('Pilih jabatan terlebih dahulu.'); 
      return; 
    }
    const password = document.getElementById('inputPassword').value.trim();
    hideError();
    if (!password) { 
      showError('Kata sandi tidak boleh kosong.'); 
      return; 
    }
    setLoading(true);
    const email = selectedJabatan.email;
    try {
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) { 
        setLoading(false); 
        showError(error.message.toLowerCase().includes('invalid') ? '❌ Kata sandi salah.' : error.message); 
        return; 
      }
      window.location.href = 'dashboard.html';
    } catch (e) { 
      setLoading(false); 
      showError('Gagal terhubung ke server.'); 
    }
  }

  function togglePassword() {
    const inp = document.getElementById('inputPassword');
    const btn = document.getElementById('btnEye');
    if (inp.type === 'password') { 
      inp.type = 'text'; 
      btn.textContent = '😎'; 
    } else { 
      inp.type = 'password'; 
      btn.textContent = '👁️'; 
    }
  }

  function setLoading(on) {
    const btn = document.getElementById('btnMasuk');
    btn.disabled = on;
    btn.textContent = on ? '⏳ Memverifikasi...' : 'Masuk ke Sistem';
  }
  
  function showError(msg) { 
    const el = document.getElementById('alertError'); 
    el.textContent = msg; 
    el.classList.add('show'); 
    setTimeout(() => {
      el.classList.remove('show');
    }, 4000);
  }
  
  function hideError() { 
    document.getElementById('alertError').classList.remove('show'); 
  }
  // Tanggal dan Jam Realtime
function updateDateTime() {
  const now = new Date();
  
  // Format tanggal: Senin, 21 Mei 2026
  const optionsDate = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  const dateString = now.toLocaleDateString('id-ID', optionsDate);
  
  // Format jam: 14:30:45
  const timeString = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  
  const dateElem = document.getElementById('dateDisplay');
  const timeElem = document.getElementById('timeDisplay');
  
  if (dateElem) dateElem.textContent = dateString;
  if (timeElem) timeElem.textContent = timeString;
}

// Update setiap detik
updateDateTime();
setInterval(updateDateTime, 1000);
</script>
</body>
</html>
