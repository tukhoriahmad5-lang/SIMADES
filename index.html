<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>SIMADES SIDOMULYO — Masuk</title>
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --primary: #059669;
      --primary-hover: #047857;
      --border: #cbd5e1;
      --input-bg: #f8fafc;
    }
    body { background-color: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; }
    .header { text-align: center; margin-bottom: 24px; width: 100%; max-width: 380px; }
    .title { font-size: 36px; font-weight: 800; color: #34d399; }
    .subtitle-desa { font-size: 16px; font-weight: 700; color: #ffffff; margin-top: 10px; }
    .card { width: 100%; max-width: 380px; background: var(--card-bg); border-radius: 12px; padding: 28px 24px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
    .form-group input { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 15px; outline: none; }
    .form-group input:focus { border-color: var(--primary); background: #ffffff; }
    .input-readonly { background: #e2e8f0 !important; color: var(--text-muted) !important; cursor: not-allowed; }
    .pass-wrap { position: relative; }
    .pass-wrap input { padding-right: 44px; }
    .btn-toggle-pass { position: absolute; right: 0; top: 0; height: 100%; width: 44px; background: none; border: none; cursor: pointer; color: var(--text-muted); }
    .btn-submit { width: 100%; background: var(--primary); color: #ffffff; border: none; border-radius: 8px; padding: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .btn-submit:disabled { background: #cbd5e1; cursor: not-allowed; }
    .alert-error { display: none; background: #fef2f2; color: #ef4444; border: 1px solid #fee2e2; border-radius: 8px; padding: 12px; font-size: 13px; margin-top: 14px; text-align: center; }
    .alert-error.show { display: block; }
    .search-container { position: relative; width: 100%; }
    .dropdown-list { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid var(--border); border-radius: 8px; max-height: 200px; overflow-y: auto; z-index: 100; display: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .dropdown-list.show { display: block; }
    .dropdown-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
    .dropdown-item:hover { background: #e6f7f0; }
    .no-results { padding: 10px 14px; color: var(--text-muted); font-style: italic; }
  </style>
</head>
<body>

<div class="header">
  <h1 class="title">SIMADES</h1>
  <p class="subtitle-desa">SIDOMULYO</p>
</div>

<form class="card" id="formLogin" onsubmit="prosesMasukForm(event)">
  <div class="form-group">
    <label>🔍 Cari Jabatan / Nama</label>
    <div class="search-container">
      <input type="text" id="searchJabatan" class="search-input" placeholder="Ketik nama jabatan atau pejabat..." autocomplete="off" oninput="filterJabatan()" onfocus="showDropdown()">
      <div id="dropdownList" class="dropdown-list"></div>
    </div>
  </div>

  <div class="form-group">
    <label>Jabatan Terpilih</label>
    <input type="text" id="inputJabatan" class="input-readonly" readonly placeholder="Akan terisi otomatis..." />
  </div>

  <div class="form-group">
    <label>Nama Pejabat Terkait</label>
    <input id="inputNama" type="text" class="input-readonly" readonly placeholder="Akan terisi otomatis..." />
  </div>

  <div class="form-group">
    <label>Kata Sandi</label>
    <div class="pass-wrap">
      <input id="inputPassword" type="password" placeholder="Masukkan kata sandi" autocomplete="off" />
      <button class="btn-toggle-pass" onclick="togglePassword()" type="button" id="btnEye">👁️</button>
    </div>
  </div>

  <button class="btn-submit" id="btnMasuk" type="submit">Masuk ke Sistem</button>
  <div class="alert-error" id="alertError"></div>
</form>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>

<script>
  const SUPA_URL = 'https://orqllypofnpsfxmavtgr.supabase.co';
  const SUPA_KEY = 'sb_publishable_1olKTJsNxGp0LBBbBb8CMQ_fpTt2mgZ';
  const supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);
  
  let dataPenggunaList = [];
  let selectedJabatan = null;

  (async function loadDataPengguna() {
    try {
      const { data, error } = await supabase.from('data_pengguna').select('jabatan, nama_pejabat, email, role');
      if (error) throw error;
      dataPenggunaList = data || [];
      renderDropdown(dataPenggunaList);
    } catch (e) { console.error(e); }
  })();

  function renderDropdown(items) {
    const dropdown = document.getElementById('dropdownList');
    if (!items || items.length === 0) { dropdown.innerHTML = '<div class="no-results">Tidak ditemukan</div>'; return; }
    dropdown.innerHTML = '';
    items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'dropdown-item';
      div.innerHTML = `<strong>${item.jabatan}</strong><br><small style="color:#64748b;">${item.nama_pejabat}</small>`;
      div.onclick = () => selectJabatan(item);
      dropdown.appendChild(div);
    });
  }

  function filterJabatan() {
    const searchTerm = document.getElementById('searchJabatan').value.toLowerCase().trim();
    if (searchTerm === '') { renderDropdown(dataPenggunaList); showDropdown(); return; }
    const filtered = dataPenggunaList.filter(item => item.jabatan.toLowerCase().includes(searchTerm) || item.nama_pejabat.toLowerCase().includes(searchTerm));
    renderDropdown(filtered);
    showDropdown();
  }

  function selectJabatan(item) {
    selectedJabatan = item;
    document.getElementById('searchJabatan').value = `${item.jabatan} - ${item.nama_pejabat}`;
    document.getElementById('inputJabatan').value = item.jabatan;
    document.getElementById('inputNama').value = item.nama_pejabat;
    hideDropdown();
    hideError();
  }

  function showDropdown() { document.getElementById('dropdownList').classList.add('show'); }
  function hideDropdown() { document.getElementById('dropdownList').classList.remove('show'); }
  document.addEventListener('click', function(e) { if (!e.target.closest('.search-container')) hideDropdown(); });

  function prosesMasukForm(event) { event.preventDefault(); masuk(); }
  
  async function masuk() {
    if (!selectedJabatan) { showError('Pilih jabatan terlebih dahulu.'); return; }
    const password = document.getElementById('inputPassword').value.trim();
    hideError();
    if (!password) { showError('Kata sandi kosong.'); return; }
    setLoading(true);
    const email = selectedJabatan.email;
    try {
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) { setLoading(false); showError(error.message.toLowerCase().includes('invalid') ? 'Kata sandi salah.' : error.message); return; }
      window.location.href = 'dashboard.html';
    } catch (e) { setLoading(false); showError('Gagal terhubung ke server.'); }
  }

  function togglePassword() {
    const inp = document.getElementById('inputPassword');
    const btn = document.getElementById('btnEye');
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁️'; }
  }

  function setLoading(on) {
    const btn = document.getElementById('btnMasuk');
    btn.disabled = on;
    btn.textContent = on ? 'Memverifikasi...' : 'Masuk ke Sistem';
  }
  function showError(msg) { const el = document.getElementById('alertError'); el.textContent = msg; el.classList.add('show'); }
  function hideError() { document.getElementById('alertError').classList.remove('show'); }
</script>
</body>
</html>
