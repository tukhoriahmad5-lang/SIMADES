<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>SIMADES SIDOMULYO — Ganti Password</title>
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --sidebar-bg: #1e293b;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --primary: #059669;
      --primary-hover: #047857;
      --border: #cbd5e1;
      --danger: #ef4444;
      --input-bg: #f8fafc;
    }

    body {
      background-color: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
    }

    .app-container {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      color: #e2e8f0;
      position: fixed;
      top: 0;
      left: -280px;
      height: 100vh;
      transition: left 0.3s ease;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      box-shadow: 2px 0 8px rgba(0,0,0,0.2);
    }

    .sidebar.open { left: 0; }
    .sidebar-header { padding: 24px 20px; border-bottom: 1px solid #334155; }
    .sidebar-header h3 { color: #34d399; font-size: 20px; }
    .sidebar-header p { font-size: 12px; color: #94a3b8; margin-top: 4px; }
    .sidebar-menu { flex: 1; padding: 20px 0; }
    .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      cursor: pointer;
      transition: background 0.2s;
      color: #cbd5e1;
      text-decoration: none;
    }
    .menu-item:hover { background: #334155; color: #34d399; }
    .menu-item span:first-child { font-size: 20px; }
    .sidebar-footer { padding: 20px; border-top: 1px solid #334155; font-size: 12px; color: #64748b; }

    /* Main Content */
    .main-content { flex: 1; width: 100%; min-height: 100vh; }

    /* Navbar */
    .navbar {
      background: #1e293b;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 999;
      flex-wrap: wrap;
      gap: 10px;
    }
    .navbar-left { display: flex; align-items: center; gap: 16px; }
    .menu-toggle { background: none; border: none; color: #34d399; font-size: 24px; cursor: pointer; padding: 8px; }
    .brand { font-weight: 800; font-size: 18px; color: #34d399; }
    .user-info { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .user-detail { text-align: right; }
    .user-name { color: #e2e8f0; font-size: 14px; font-weight: 600; }
    .user-jabatan { color: #94a3b8; font-size: 11px; }
    .btn-logout { background: transparent; border: 1px solid #475569; color: #cbd5e1; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-logout:hover { background: var(--danger); border-color: var(--danger); color: #ffffff; }

    /* Container */
    .container { padding: 20px; max-width: 500px; margin: 0 auto; }
    .welcome-bar { margin-bottom: 20px; }
    .welcome-bar h2 { color: #ffffff; font-size: 20px; font-weight: 700; }
    .welcome-bar p { color: #94a3b8; font-size: 13px; margin-top: 4px; }

    /* Card */
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
    .form-group input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: var(--input-bg); }
    .form-group input:focus { outline: none; border-color: var(--primary); }

    .btn-primary {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }

    .footer { text-align: center; padding: 16px; color: #64748b; font-size: 11px; }
    .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
    .overlay.show { display: block; }

    @media (min-width: 768px) {
      .sidebar { position: relative; left: 0; width: 260px; }
      .menu-toggle { display: none; }
    }
    @media (max-width: 768px) {
      .user-detail { text-align: left; }
      .navbar { flex-direction: row; justify-content: space-between; }
      .container { padding: 16px; }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header"><h3>SIMADES</h3><p>Desa Sidomulyo</p></div>
    <div class="sidebar-menu" id="sidebarMenu"></div>
    <div class="sidebar-footer"><span id="sidebarJabatan">Loading...</span></div>
  </div>

  <div class="main-content">
    <nav class="navbar">
      <div class="navbar-left">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <a href="dashboard.html" class="brand" style="text-decoration: none; color: #34d399;">SIMADES</a>
      </div>
      <div class="user-info">
        <div class="user-detail">
          <div class="user-name" id="userNameDisplay">Loading...</div>
          <div class="user-jabatan" id="userJabatanDisplay">-</div>
        </div>
        <button class="btn-logout" onclick="logout()">Keluar</button>
      </div>
    </nav>

    <div class="container">
      <div class="welcome-bar">
        <h2>Ganti Password</h2>
        <p>Ubah password akun Anda</p>
      </div>
      <div class="card">
        <div class="form-group">
          <label>Password Lama *</label>
          <input type="password" id="oldPassword" placeholder="Masukkan password lama">
        </div>
        <div class="form-group">
          <label>Password Baru *</label>
          <input type="password" id="newPassword" placeholder="Minimal 6 karakter">
        </div>
        <div class="form-group">
          <label>Konfirmasi Password Baru *</label>
          <input type="password" id="confirmPassword" placeholder="Ulangi password baru">
        </div>
        <button class="btn-primary" id="btnGantiPassword" onclick="prosesGantiPassword()">Ganti Password</button>
      </div>
    </div>
    <div class="footer">&copy; 2026 Pemerintah Desa Sidomulyo</div>
  </div>
</div>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>

<script>
  const SUPA_URL = 'https://orqllypofnpsfxmavtgr.supabase.co';
  const SUPA_KEY = 'sb_publishable_1olKTJsNxGp0LBBbBb8CMQ_fpTt2mgZ';
  const supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);

  let currentUser = { nama: '', jabatan: '', role: '', email: '' };

  function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
  function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

  async function cekSesi() {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) { window.location.href = 'index.html'; return; }
    currentUser.email = user.email;

    const { data: profil } = await supabase
      .from('data_pengguna')
      .select('nama_pejabat, jabatan, role')
      .eq('auth_id', user.id)
      .single();

    if (!profil) {
      await supabase.auth.signOut();
      window.location.href = 'index.html';
      return;
    }

    currentUser.nama = profil.nama_pejabat;
    currentUser.jabatan = profil.jabatan;
    currentUser.role = profil.role;

    document.getElementById('userNameDisplay').textContent = currentUser.nama;
    document.getElementById('userJabatanDisplay').textContent = currentUser.jabatan;
    document.getElementById('sidebarJabatan').textContent = currentUser.jabatan;

    renderSidebar();
  }

  function renderSidebar() {
    const sidebarMenu = document.getElementById('sidebarMenu');
    let menuHtml = '';

    if (currentUser.role === 'admin') {
      menuHtml = `
        <a href="kelola-user.html" class="menu-item"><span>👑</span> <span>Kelola User</span></a>
        <a href="ganti-password.html" class="menu-item"><span>🔑</span> <span>Ganti Password</span></a>
      `;
    } else if (currentUser.role === 'pemdes') {
      menuHtml = `
        <a href="kartu-keluarga.html" class="menu-item"><span>📋</span> <span>Kartu Keluarga</span></a>
        <a href="daftar-penduduk.html" class="menu-item"><span>👥</span> <span>Daftar Penduduk</span></a>
        <a href="surat.html" class="menu-item"><span>📝</span> <span>Surat Menyurat</span></a>
        <a href="pengaturan-desa.html" class="menu-item"><span>🏠</span> <span>Pengaturan Desa</span></a>
        <a href="ganti-password.html" class="menu-item"><span>🔑</span> <span>Ganti Password</span></a>
      `;
    } else if (currentUser.role === 'rt') {
      menuHtml = `
        <a href="kartu-keluarga.html" class="menu-item"><span>📋</span> <span>Kartu Keluarga</span></a>
        <a href="daftar-penduduk.html" class="menu-item"><span>👥</span> <span>Daftar Penduduk</span></a>
        <a href="ganti-password.html" class="menu-item"><span>🔑</span> <span>Ganti Password</span></a>
      `;
    }

    sidebarMenu.innerHTML = menuHtml;
  }

  async function prosesGantiPassword() {
    const oldPass = document.getElementById('oldPassword').value;
    const newPass = document.getElementById('newPassword').value;
    const confirmPass = document.getElementById('confirmPassword').value;

    if (!oldPass) { alert('Password lama harus diisi!'); return; }
    if (!newPass || newPass.length < 6) { alert('Password baru minimal 6 karakter!'); return; }
    if (newPass !== confirmPass) { alert('Konfirmasi password tidak cocok!'); return; }

    const btn = document.getElementById('btnGantiPassword');
    btn.disabled = true;
    btn.textContent = 'Memproses...';

    try {
      // Verifikasi password lama
      const { error: signInError } = await supabase.auth.signInWithPassword({ 
        email: currentUser.email, 
        password: oldPass 
      });
      if (signInError) { 
        alert('Password lama salah!'); 
        btn.disabled = false; 
        btn.textContent = 'Ganti Password'; 
        return; 
      }

      // Update password
      const { error: updateError } = await supabase.auth.updateUser({ password: newPass });
      if (updateError) { 
        alert('Gagal mengganti password: ' + updateError.message); 
      } else { 
        alert('✅ Password berhasil diganti! Silakan login kembali dengan password baru.');
        await logout();
      }
    } catch (err) { 
      alert('Terjadi kesalahan: ' + err.message); 
    } finally { 
      btn.disabled = false; 
      btn.textContent = 'Ganti Password'; 
    }
  }

  async function logout() {
    if (confirm('Yakin ingin keluar?')) {
      await supabase.auth.signOut();
      window.location.href = 'index.html';
    }
  }

  document.addEventListener('DOMContentLoaded', cekSesi);
</script>
</body>
</html>
